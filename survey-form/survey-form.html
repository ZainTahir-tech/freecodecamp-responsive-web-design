<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Survey Form</title>
    <link rel="stylesheet" href="survey-form.css">
  </head>
  <body>
    <h1 id="title">Survey Form</h1>
    <p id="description">This survey will help us to improve your experience on the platform</p>
    <div class="form-div">
      <form id="survey-form" action="" method="get">
        <fieldset>
          <label id="name-label" for="name">Name
          <input id="name" type="text" required placeholder="Enter your name">
          </label>
          <label id="email-label" for="email">Email
            <input id="email" type="email" required placeholder="Enter your Email">
          </label>
          <label id="number-label" for="number">Age (optional)
            <input id="number" type="number" min="10" max="100" placeholder="Age">
          </label>
        </fieldset>
        <fieldset>
          <label for="dropdown">Which option best describes your current role?
            <select id="dropdown" class="transparent-color">
              <option value="select-role" selected disabled>Select current role</option>
              <option value="1">Student</option>
              <option value="2">Full Time Job</option>
              <option value="3">Part Time Job</option>
              <option value="4">Prefer not to say</option>
              <option value="5">Other</option>
            </select>
          </label>
        </fieldset>
        <fieldset>
          <legend>Would you recommend SkillNest to a friend?</legend>
          <label>
            <input type="radio" name="recommend-choice" checked> Definitely
          </label>
          <label>  
            <input type="radio" name="recommend-choice"> Maybe
          </label>
          <label>
            <input type="radio" name="recommend-choice"> Not sure
          </label>
          <label for="another-dropdown">What is your favorite feature of SkillNest?
            <select id="another-dropdown" class="transparent-color">
              <option value="select-option" selected disabled>Select an option</option>
              <option value="1">Challenges</option>
              <option value="2">Projects</option>
              <option value="3">Community</option>
              <option value="4">Open Source</option>
            </select>
          </label>
        </fieldset>
        <fieldset>
          <legend>What would you like to see improved? (Check all that apply)</legend>
          <label for="front-end">
            <input id="front-end" value="front-end-projects" type="checkbox"> Front-end Projects
          </label>
          <label for="back-end">
            <input id="back-end" value="back-end-projects" type="checkbox"> Back-end Projects
          </label>
          <label for="data-visual">
            <input id="data-visual" value="data-visualization" type="checkbox"> Data Visualization
          </label>
          <label for="challenges">
            <input id="challenges" value="challenges" type="checkbox"> Challenges
          </label>
          <label for="open-source">
            <input id="open-source" value="open-source-community" type="checkbox"> Open Source Community
          </label>
          <label for="gitter-help">
            <input id="gitter-help" value="gitter-help-rooms" type="checkbox"> Gitter help rooms
          </label>
          <label for="videos">
            <input id="videos" value="videos" type="checkbox"> Videos
          </label>
          <label for="city-meetups">
            <input id="city-meetups" value="city-meetups" type="checkbox"> City Meetups
          </label>
          <label for="wiki">
            <input id="wiki" value="wiki" type="checkbox"> Wiki
          </label>
          <label for="forum">
            <input id="forum" value="forum" type="checkbox"> Forum
          </label>
          <label for="additional-courses">
            <input id="additional-courses" value="additional-courses" type="checkbox"> Additional Courses
          </label>
          <label for="textarea">
          Any comments or suggestions?
            <textarea id="textarea" cols="40" rows="5" placeholder="Enter your comment here..."></textarea>
          </label>
        </fieldset>
        <input id="submit" value="Submit" type="submit">
      </form>
    </div>
  </body>
</html>
